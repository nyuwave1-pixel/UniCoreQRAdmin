<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNI&CORE — 회원 QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);display:flex;align-items:center;justify-content:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

    /* ─ Card ─ */
    .card{background:#fff;border-radius:20px;overflow:hidden;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.35)}
    .card-header{padding:36px 28px 28px;text-align:center;color:#fff;background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%)}
    .card-header .logo{width:60px;height:60px;background:rgba(255,255,255,.18);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;font-weight:800;backdrop-filter:blur(8px)}
    .card-header h1{font-size:20px;font-weight:700;margin-bottom:4px}
    .card-header p{font-size:13px;opacity:.8}
    .card-body{padding:28px}

    /* ─ Form ─ */
    .field label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
    .field input{width:100%;padding:13px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:.05em;transition:border-color .2s}
    .field input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.1)}
    .field input::placeholder{text-align:left;letter-spacing:normal;color:#94a3b8}
    .error-box{display:none;padding:11px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#dc2626;font-size:13px;text-align:center;margin-bottom:14px}
    .error-box.show{display:block}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-outline{background:#f8fafc;border:1.5px solid #e2e8f0;color:#475569}
    .btn-outline:hover{border-color:#6366f1;color:#6366f1}
    .footer-note{text-align:center;margin-top:16px;font-size:12px;color:#94a3b8}

    /* ─ Dashboard ─ */
    #dashboard{display:none}
    .dash-header{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:22px 24px;display:flex;align-items:center;justify-content:space-between;color:#fff}
    .dash-name{font-size:17px;font-weight:700}
    .dash-sub{font-size:12px;opacity:.75;margin-top:2px}
    .logout-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
    .dash-body{padding:20px}

    /* ─ Info grid ─ */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .info-item{background:#f8fafc;border-radius:10px;padding:12px}
    .info-item .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:3px}
    .info-item .value{font-size:14px;font-weight:600;color:#1e293b}

    /* ─ QR type tabs ─ */
    .qr-tabs{display:flex;gap:6px;margin-bottom:16px;background:#f1f5f9;border-radius:10px;padding:4px}
    .qr-tab{flex:1;padding:9px;border-radius:7px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;font-family:inherit;transition:all .15s}
    .qr-tab.active{background:#fff;color:#6366f1;box-shadow:0 1px 4px rgba(0,0,0,.08)}

    /* ─ QR section ─ */
    .qr-panel{background:#f8fafc;border-radius:14px;padding:20px;text-align:center}
    .qr-panel h3{font-size:14px;font-weight:700;color:#1e293b;margin-bottom:4px}
    .qr-panel p{font-size:12px;color:#64748b;margin-bottom:16px;line-height:1.5}
    .qr-wrap{display:inline-block;background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
    .qr-wrap canvas{display:block;border-radius:6px}
    .qr-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}
    .badge-mb{background:rgba(99,102,241,.1);color:#6366f1;border:1px solid rgba(99,102,241,.25)}
    .badge-hq{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.25)}
    .expiry-bar{font-size:11px;color:#94a3b8;margin-top:4px}

    /* ─ Action buttons ─ */
    .action-row{display:flex;gap:8px;margin-top:10px}
    .btn-sm{flex:1;padding:10px 8px;font-size:13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
    .btn-sm-primary{background:#6366f1;color:#fff}
    .btn-sm-primary:hover{background:#4f46e5}
    .btn-sm-outline{background:#fff;border:1.5px solid #e2e8f0;color:#475569}
    .btn-sm-outline:hover{border-color:#6366f1;color:#6366f1}

    /* ─ Scan section ─ */
    .scan-link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;text-decoration:none;margin-top:14px;transition:all .15s}
    .scan-link:hover{border-color:#22c55e;background:#dcfce7}
    .scan-link .scan-icon{width:40px;height:40px;background:#22c55e;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .scan-link .scan-text{text-align:left}
    .scan-link .scan-title{font-size:14px;font-weight:700;color:#166534}
    .scan-link .scan-sub{font-size:11px;color:#4ade80;margin-top:1px}
    .scan-link .scan-arrow{margin-left:auto;color:#4ade80;font-size:18px}

    .admin-link{display:block;text-align:center;margin-top:14px;font-size:12px;color:rgba(255,255,255,.35);text-decoration:none}
    .admin-link:hover{color:rgba(255,255,255,.6)}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-wrap" style="width:100%;max-width:420px">
  <div class="card">
    <div class="card-header">
      <div class="logo">U&C</div>
      <h1>UNI&CORE QR 프로모션</h1>
      <p>회원번호를 입력하여 로그인하세요</p>
    </div>
    <div class="card-body">
      <div class="error-box" id="login-error"></div>
      <form onsubmit="event.preventDefault();handleLogin()">
        <div class="field" style="margin-bottom:16px">
          <label>회원번호</label>
          <input type="text" id="member-input" placeholder="회원번호를 입력하세요" inputmode="numeric" autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span id="login-text">로그인</span>
        </button>
      </form>
      <p class="footer-note">회원만 QR코드를 생성할 수 있습니다</p>
    </div>
  </div>
  <a href="admin/index.html" class="admin-link">관리자 페이지</a>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard" style="width:100%;max-width:420px">
  <div class="card">
    <div class="dash-header">
      <div>
        <div class="dash-name" id="d-name">-</div>
        <div class="dash-sub">회원번호: <span id="d-id">-</span></div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>
    <div class="dash-body">

      <!-- Member info -->
      <div class="info-grid">
        <div class="info-item"><div class="label">국가</div><div class="value" id="d-country">-</div></div>
        <div class="info-item"><div class="label">상태</div><div class="value" style="color:#16a34a">활동</div></div>
        <div class="info-item"><div class="label">연락처</div><div class="value" id="d-phone">-</div></div>
        <div class="info-item"><div class="label">이메일</div><div class="value" id="d-email" style="font-size:11px;word-break:break-all">-</div></div>
      </div>

      <!-- QR section -->
      <div class="qr-tabs">
        <button class="qr-tab active" onclick="switchTab('member')">사용자 QR</button>
        <button class="qr-tab" onclick="switchTab('hq')">본사 QR 스캔</button>
      </div>

      <!-- Tab: 사용자 QR -->
      <div id="tab-member" class="qr-panel">
        <h3>내 사용자 QR</h3>
        <p>매장 직원에게 제시하여 본인 인증에 사용하세요.<br>24시간 후 자동 만료됩니다.</p>
        <div id="mb-qr-wrap" style="display:none">
          <div class="qr-badge badge-mb">MB · 사용자 QR</div><br>
          <div class="qr-wrap"><div id="mb-qr-canvas"></div></div>
          <div class="expiry-bar" id="mb-expiry-text"></div>
          <div class="action-row">
            <button class="btn-sm btn-sm-outline" onclick="generateMemberQR()">&#8635; 갱신</button>
            <button class="btn-sm btn-sm-outline" onclick="downloadQR('mb-qr-canvas')">&#8595; 저장</button>
          </div>
        </div>
        <div id="mb-qr-placeholder">
          <button class="btn-sm btn-sm-primary" style="width:100%;padding:13px" onclick="generateMemberQR()">&#128246; 사용자 QR 생성</button>
        </div>
      </div>

      <!-- Tab: 본사 QR 스캔 -->
      <div id="tab-hq" class="qr-panel" style="display:none">
        <h3>본사 QR 스캔</h3>
        <p>매장에서 제공하는 본사 QR 코드를 스캔하거나<br>QR 코드 번호를 직접 입력하세요.</p>
        <a class="scan-link" id="scan-btn" href="scan/index.html">
          <div class="scan-icon">&#128247;</div>
          <div class="scan-text">
            <div class="scan-title">카메라로 QR 스캔</div>
            <div class="scan-sub">본사 QR · 매장 QR · 사용자 QR 모두 지원</div>
          </div>
          <div class="scan-arrow">&#8250;</div>
        </a>
      </div>

    </div>
  </div>
  <a href="admin/index.html" class="admin-link">관리자 페이지</a>
</div>

<div id="toast-wrap" style="position:fixed;top:20px;right:20px;z-index:999"></div>

<script>
const SALT = 'unicore-qr-2026-salt-key';
let loginIndex = null, memberDisplay = null;
let currentHash = null, currentMemberId = null, currentDisplay = null;
let mbQRObj = null;

/* ── Hash ── */
async function hashMemberId(id) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(SALT + String(id)));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0, 16);
}

/* ── Data load ── */
async function loadData() {
  if (!loginIndex) loginIndex = await (await fetch('data/login-index.json')).json();
  if (!memberDisplay) memberDisplay = await (await fetch('data/member-display.json')).json();
}

/* ── Login ── */
document.addEventListener('DOMContentLoaded', async () => {
  const savedHash = sessionStorage.getItem('qr_hash');
  const savedId = sessionStorage.getItem('qr_mid');
  if (savedHash && savedId) {
    try {
      await loadData();
      const display = memberDisplay[savedHash];
      if (display) { currentHash = savedHash; currentMemberId = savedId; currentDisplay = display; showDashboard(); return; }
    } catch {}
    sessionStorage.removeItem('qr_hash'); sessionStorage.removeItem('qr_mid');
  }
});

async function handleLogin() {
  const rawId = document.getElementById('member-input').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');
  if (!rawId) { showError('회원번호를 입력하세요'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  document.getElementById('login-text').textContent = '인증 중…';

  try {
    await loadData();
    const hash = await hashMemberId(rawId);
    const entry = loginIndex[hash];
    if (!entry) { showError('등록되지 않은 회원번호입니다'); return; }
    if (entry.s !== 1) { showError('비활성 계정입니다. 관리자에게 문의하세요.'); return; }
    const display = memberDisplay[hash];
    if (!display) { showError('회원 정보를 찾을 수 없습니다'); return; }

    currentHash = hash; currentMemberId = rawId; currentDisplay = display;
    sessionStorage.setItem('qr_hash', hash);
    sessionStorage.setItem('qr_mid', rawId);
    showDashboard();
  } catch { showError('데이터를 불러오는데 실패했습니다'); }
  finally { btn.disabled = false; document.getElementById('login-text').textContent = '로그인'; }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.classList.add('show');
}

/* ── Dashboard ── */
const COUNTRY = { KR: '한국', US: '미국', JP: '일본', CN: '중국', VN: '베트남' };

function showDashboard() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  document.getElementById('d-name').textContent = currentDisplay.n || '-';
  document.getElementById('d-id').textContent = currentMemberId;
  document.getElementById('d-country').textContent = COUNTRY[currentDisplay.c] || currentDisplay.c || '-';
  document.getElementById('d-phone').textContent = currentDisplay.p || '-';
  document.getElementById('d-email').textContent = currentDisplay.e || '-';

  // Scan link with member pre-fill
  document.getElementById('scan-btn').href = 'scan/index.html?mid=' + encodeURIComponent(currentMemberId);

  // Auto-generate or restore member QR
  const stored = getStoredMemberQR();
  if (stored && stored.expiry > Date.now()) {
    renderMemberQR(stored.token, stored.expiry);
  }
}

function handleLogout() {
  sessionStorage.removeItem('qr_hash'); sessionStorage.removeItem('qr_mid');
  currentHash = currentMemberId = currentDisplay = null;
  document.getElementById('login-wrap').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('member-input').value = '';
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('mb-qr-canvas').innerHTML = '';
  document.getElementById('mb-qr-wrap').style.display = 'none';
  document.getElementById('mb-qr-placeholder').style.display = '';
}

/* ── Tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.qr-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'member') || (i === 1 && tab === 'hq')));
  document.getElementById('tab-member').style.display = tab === 'member' ? '' : 'none';
  document.getElementById('tab-hq').style.display = tab === 'hq' ? '' : 'none';
}

/* ── Member QR (사용자 QR) ── */
function generateMemberQR() {
  if (!currentHash) return;
  const expiry = Date.now() + 24 * 60 * 60 * 1000; // 24h
  const token = 'MB-' + currentHash + '-' + expiry.toString(36);
  localStorage.setItem('mb_qr_' + currentHash, JSON.stringify({ token, expiry }));
  renderMemberQR(token, expiry);
  toast('사용자 QR이 생성되었습니다', 'success');
}

function getStoredMemberQR() {
  if (!currentHash) return null;
  const raw = localStorage.getItem('mb_qr_' + currentHash);
  return raw ? JSON.parse(raw) : null;
}

function renderMemberQR(token, expiry) {
  document.getElementById('mb-qr-placeholder').style.display = 'none';
  document.getElementById('mb-qr-wrap').style.display = '';
  const wrap = document.getElementById('mb-qr-canvas');
  wrap.innerHTML = '';
  if (mbQRObj) { try { mbQRObj.clear(); } catch {} }
  mbQRObj = new QRCode(wrap, { text: token, width: 180, height: 180, colorDark: '#1e1b4b', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  updateExpiryText(expiry);
  // Update every second
  clearInterval(window._expiryTimer);
  window._expiryTimer = setInterval(() => { if (expiry <= Date.now()) { clearInterval(window._expiryTimer); generateMemberQR(); } else { updateExpiryText(expiry); } }, 1000);
}

function updateExpiryText(expiry) {
  const diff = expiry - Date.now();
  if (diff <= 0) { document.getElementById('mb-expiry-text').textContent = '만료됨'; return; }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('mb-expiry-text').textContent = `만료까지 ${h > 0 ? h + '시간 ' : ''}${m}분 ${s}초`;
}

function downloadQR(containerId) {
  const canvas = document.querySelector('#' + containerId + ' canvas');
  if (!canvas) return;
  const a = document.createElement('a'); a.download = 'UnicoreQR.png'; a.href = canvas.toDataURL('image/png'); a.click();
}

/* ── Toast ── */
function toast(msg, type) {
  const el = document.createElement('div');
  el.style.cssText = 'padding:11px 18px;border-radius:10px;font-size:13px;color:#fff;margin-bottom:8px;box-shadow:0 4px 12px rgba(0,0,0,.15)';
  el.style.background = type === 'success' ? '#22c55e' : '#ef4444';
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
